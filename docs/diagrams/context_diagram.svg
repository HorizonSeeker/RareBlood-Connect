<svg id="context-diagram" width="100%" xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink" class="flowchart" style="max-width: 1400px; background-color: white;" viewBox="0 0 1400 600" role="graphics-document document" aria-roledescription="flowchart-v2"><defs><style type="text/css">
#context-diagram {
  font-family: "trebuchet ms", verdana, arial, sans-serif;
  font-size: 16px;
  fill: #333;
}

#context-diagram .node rect {
  fill: #ECECFF;
  stroke: #9370DB;
  stroke-width: 2px;
}

#context-diagram .node.system rect {
  fill: #FFE5E5;
  stroke: #DB6B6B;
  stroke-width: 3px;
}

#context-diagram .node.service rect {
  fill: #E5F3FF;
  stroke: #6B9BDB;
  stroke-width: 2px;
}

#context-diagram .edgePath .path {
  stroke: #333333;
  stroke-width: 2px;
  fill: none;
}

#context-diagram .edgeLabel {
  background-color: rgba(232, 232, 232, 0.8);
  text-align: center;
  font-size: 14px;
}

#context-diagram .label {
  font-family: "trebuchet ms", verdana, arial, sans-serif;
  color: #333;
  text-align: center;
  text-anchor: middle;
}

#context-diagram .arrowheadPath {
  fill: #333333;
}

#context-diagram marker {
  fill: #333333;
  stroke: #333333;
}
</style></defs>

<g>
  <!-- White background -->
  <rect width="1400" height="600" fill="white"/>
  
  <!-- Define arrow markers -->
  <defs>
    <marker id="arrowhead" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto">
      <polygon points="0 0, 10 3, 0 6" fill="#333333" />
    </marker>
  </defs>

  <!-- User Actors (Left side) -->
  <g id="donor-group">
    <rect x="50" y="80" width="140" height="80" fill="#ECECFF" stroke="#9370DB" stroke-width="2" rx="5"/>
    <text x="120" y="115" text-anchor="middle" font-size="14" font-weight="bold" fill="#333">👤 Donor</text>
    <text x="120" y="135" text-anchor="middle" font-size="12" fill="#333">Blood Donor</text>
    <text x="120" y="150" text-anchor="middle" font-size="12" fill="#666">User</text>
  </g>

  <g id="hospital-group">
    <rect x="50" y="220" width="140" height="80" fill="#ECECFF" stroke="#9370DB" stroke-width="2" rx="5"/>
    <text x="120" y="255" text-anchor="middle" font-size="14" font-weight="bold" fill="#333">🏥 Hospital</text>
    <text x="120" y="275" text-anchor="middle" font-size="12" fill="#333">Blood Request</text>
    <text x="120" y="290" text-anchor="middle" font-size="12" fill="#666">User</text>
  </g>

  <g id="bloodbank-group">
    <rect x="50" y="360" width="140" height="80" fill="#ECECFF" stroke="#9370DB" stroke-width="2" rx="5"/>
    <text x="120" y="395" text-anchor="middle" font-size="14" font-weight="bold" fill="#333">🩸 Blood Bank</text>
    <text x="120" y="415" text-anchor="middle" font-size="12" fill="#333">Inventory</text>
    <text x="120" y="430" text-anchor="middle" font-size="12" fill="#666">Manager</text>
  </g>

  <g id="admin-group">
    <rect x="50" y="500" width="140" height="80" fill="#ECECFF" stroke="#9370DB" stroke-width="2" rx="5"/>
    <text x="120" y="535" text-anchor="middle" font-size="14" font-weight="bold" fill="#333">👨‍💼 Admin</text>
    <text x="120" y="555" text-anchor="middle" font-size="12" fill="#333">Verification</text>
    <text x="120" y="570" text-anchor="middle" font-size="12" fill="#666">Manager</text>
  </g>

  <!-- Central System -->
  <g id="system-group">
    <rect x="450" y="200" width="200" height="120" fill="#FFE5E5" stroke="#DB6B6B" stroke-width="3" rx="5"/>
    <text x="550" y="240" text-anchor="middle" font-size="16" font-weight="bold" fill="#333">🔴 RareBlood</text>
    <text x="550" y="260" text-anchor="middle" font-size="16" font-weight="bold" fill="#333">Connect System</text>
    <text x="550" y="285" text-anchor="middle" font-size="12" fill="#666">Core Application</text>
  </g>

  <!-- External Services (Right side) -->
  <g id="firebase-group">
    <rect x="850" y="50" width="140" height="80" fill="#E5F3FF" stroke="#6B9BDB" stroke-width="2" rx="5"/>
    <text x="920" y="80" text-anchor="middle" font-size="14" font-weight="bold" fill="#333">🔐 Firebase</text>
    <text x="920" y="100" text-anchor="middle" font-size="12" fill="#666">Authentication</text>
    <text x="920" y="115" text-anchor="middle" font-size="12" fill="#666">&amp; Database</text>
  </g>

  <g id="pusher-group">
    <rect x="850" y="180" width="140" height="80" fill="#E5F3FF" stroke="#6B9BDB" stroke-width="2" rx="5"/>
    <text x="920" y="215" text-anchor="middle" font-size="14" font-weight="bold" fill="#333">📢 Pusher</text>
    <text x="920" y="235" text-anchor="middle" font-size="12" fill="#666">Real-time</text>
    <text x="920" y="250" text-anchor="middle" font-size="12" fill="#666">Notifications</text>
  </g>

  <g id="groq-group">
    <rect x="850" y="310" width="140" height="80" fill="#E5F3FF" stroke="#6B9BDB" stroke-width="2" rx="5"/>
    <text x="920" y="340" text-anchor="middle" font-size="14" font-weight="bold" fill="#333">🤖 Groq AI</text>
    <text x="920" y="360" text-anchor="middle" font-size="12" fill="#666">Intelligent</text>
    <text x="920" y="375" text-anchor="middle" font-size="12" fill="#666">Chatbot</text>
  </g>

  <g id="maps-group">
    <rect x="850" y="440" width="140" height="80" fill="#E5F3FF" stroke="#6B9BDB" stroke-width="2" rx="5"/>
    <text x="920" y="470" text-anchor="middle" font-size="14" font-weight="bold" fill="#333">🗺️ Maps</text>
    <text x="920" y="490" text-anchor="middle" font-size="12" fill="#666">Geospatial</text>
    <text x="920" y="505" text-anchor="middle" font-size="12" fill="#666">Location Service</text>
  </g>

  <!-- Connections from Users to System -->
  <g id="connections-to-system">
    <!-- Donor to System -->
    <path d="M 190 120 Q 320 120 450 260" fill="none" stroke="#333333" stroke-width="2" marker-end="url(#arrowhead)"/>
    <rect x="280" y="100" width="100" height="32" fill="rgba(232,232,232,0.8)" stroke="none" rx="4"/>
    <text x="330" y="122" text-anchor="middle" font-size="12" fill="#333">Register,</text>
    
    <!-- Hospital to System -->
    <path d="M 190 260 L 450 260" fill="none" stroke="#333333" stroke-width="2" marker-end="url(#arrowhead)"/>
    <rect x="280" y="240" width="90" height="32" fill="rgba(232,232,232,0.8)" stroke="none" rx="4"/>
    <text x="325" y="262" text-anchor="middle" font-size="12" fill="#333">Request Blood</text>
    
    <!-- BloodBank to System -->
    <path d="M 190 400 Q 320 400 450 300" fill="none" stroke="#333333" stroke-width="2" marker-end="url(#arrowhead)"/>
    <rect x="270" y="380" width="100" height="32" fill="rgba(232,232,232,0.8)" stroke="none" rx="4"/>
    <text x="320" y="402" text-anchor="middle" font-size="12" fill="#333">Manage Stock</text>
    
    <!-- Admin to System -->
    <path d="M 190 540 Q 320 540 450 320" fill="none" stroke="#333333" stroke-width="2" marker-end="url(#arrowhead)"/>
    <rect x="260" y="520" width="110" height="32" fill="rgba(232,232,232,0.8)" stroke="none" rx="4"/>
    <text x="315" y="542" text-anchor="middle" font-size="12" fill="#333">Verify &amp; Manage</text>
  </g>

  <!-- Connections from System to Services -->
  <g id="connections-to-services">
    <!-- System to Firebase -->
    <path d="M 650 240 L 850 90" fill="none" stroke="#333333" stroke-width="2" marker-end="url(#arrowhead)"/>
    <rect x="710" y="145" width="60" height="28" fill="rgba(232,232,232,0.8)" stroke="none" rx="4"/>
    <text x="740" y="165" text-anchor="middle" font-size="11" fill="#333">Auth</text>
    
    <!-- System to Pusher -->
    <path d="M 650 260 L 850 220" fill="none" stroke="#333333" stroke-width="2" marker-end="url(#arrowhead)"/>
    <rect x="720" y="230" width="60" height="28" fill="rgba(232,232,232,0.8)" stroke="none" rx="4"/>
    <text x="750" y="250" text-anchor="middle" font-size="11" fill="#333">Events</text>
    
    <!-- System to Groq -->
    <path d="M 650 300 L 850 350" fill="none" stroke="#333333" stroke-width="2" marker-end="url(#arrowhead)"/>
    <rect x="730" y="310" width="60" height="28" fill="rgba(232,232,232,0.8)" stroke="none" rx="4"/>
    <text x="760" y="330" text-anchor="middle" font-size="11" fill="#333">Chat</text>
    
    <!-- System to Maps -->
    <path d="M 650 310 L 850 480" fill="none" stroke="#333333" stroke-width="2" marker-end="url(#arrowhead)"/>
    <rect x="730" y="400" width="60" height="28" fill="rgba(232,232,232,0.8)" stroke="none" rx="4"/>
    <text x="760" y="420" text-anchor="middle" font-size="11" fill="#333">Location</text>
  </g>

  <!-- Legend -->
  <g id="legend">
    <text x="50" y="580" font-size="12" fill="#999" font-style="italic">Internal Actors</text>
    <rect x="250" y="560" width="20" height="20" fill="#ECECFF" stroke="#9370DB" stroke-width="2" rx="2"/>
    <text x="280" y="575" font-size="12" fill="#666">User/Actor</text>
    
    <rect x="520" y="560" width="20" height="20" fill="#FFE5E5" stroke="#DB6B6B" stroke-width="2" rx="2"/>
    <text x="550" y="575" font-size="12" fill="#666">Core System</text>
    
    <rect x="790" y="560" width="20" height="20" fill="#E5F3FF" stroke="#6B9BDB" stroke-width="2" rx="2"/>
    <text x="820" y="575" font-size="12" fill="#666">External Service</text>
  </g>
</g></svg>